name: 🎧 DJHQ Academy <> Cohort 01 Survey

on:
  workflow_dispatch:
    inputs:

     name:
        description: "First + Last Name"
        required: true
        type: string

      overall_rating:
        description: "⭐ Overall, how would you rate Cohort 01? (1 = Poor · 5 = Excellent)"
        required: true
        type: choice
        options:
          - "5 — Excellent"
          - "4 — Good"
          - "3 — Average"
          - "2 — Below Average"
          - "1 — Poor"

      goals_achieved:
        description: "🎯 Did the program help you achieve your goals?"
        required: true
        type: choice
        options:
          - "Yes, fully"
          - "Yes, mostly"
          - "Partially"
          - "Not really"
          - "No"

      content_quality:
        description: "📚 How was the quality of the curriculum and learning materials?"
        required: true
        type: choice
        options:
          - "Outstanding"
          - "Good"
          - "Average"
          - "Needs improvement"

      most_valuable:
        description: "💡 What was the most valuable part of the program?"
        required: true
        type: string

      least_valuable:
        description: "🔧 What was the least valuable or needs improvement?"
        required: false
        type: string

      skill_applied:
        description: "⚡ What skill will you apply immediately after this cohort?"
        required: true
        type: string

      mentor_support:
        description: "🎙️ How satisfied were you with mentor/instructor support?"
        required: true
        type: choice
        options:
          - "Very satisfied"
          - "Satisfied"
          - "Neutral"
          - "Unsatisfied"
          - "Very unsatisfied"

      biggest_win:
        description: "🏆 What is your biggest win or takeaway from Cohort 01?"
        required: true
        type: string

      recommend:
        description: "📣 Would you recommend DJHQ Academy to others?"
        required: true
        type: choice
        options:
          - "Definitely yes"
          - "Probably yes"
          - "Not sure"
          - "Probably not"
          - "Definitely not"

      future_topics:
        description: "🔭 What topic or track would you most want to see in future cohorts?"
        required: false
        type: string

      suggestions:
        description: "✍️ Any final suggestions or ideas?"
        required: false
        type: string

jobs:
  collect-response:
    name: 📥 Save Survey Response
    runs-on: ubuntu-latest

    steps:
      - name: 📝 Build JSON response
        run: |
          cat <<EOF > response.json
          {
            "meta": {
              "respondent": "${{ github.actor }}",
              "submitted_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
              "cohort": "01",
              "run_id": "${{ github.run_id }}"
            },
            "responses": {
              "overall_rating": "${{ inputs.overall_rating }}",
              "goals_achieved": "${{ inputs.goals_achieved }}",
              "content_quality": "${{ inputs.content_quality }}",
              "most_valuable": "${{ inputs.most_valuable }}",
              "least_valuable": "${{ inputs.least_valuable }}",
              "skill_applied": "${{ inputs.skill_applied }}",
              "mentor_support": "${{ inputs.mentor_support }}",
              "biggest_win": "${{ inputs.biggest_win }}",
              "recommend": "${{ inputs.recommend }}",
              "future_topics": "${{ inputs.future_topics }}",
              "suggestions": "${{ inputs.suggestions }}"
            }
          }
          EOF
          echo "✅ Response saved:"
          cat response.json

      - name: 📦 Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: survey-${{ github.actor }}-${{ github.run_id }}
          path: response.json
          retention-days: 90
