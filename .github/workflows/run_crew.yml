name: Run CrewAI OSS Discovery Agent

on:
  workflow_dispatch:
    inputs:
      criteria:
        description: "Discovery criteria (e.g. 'popular AI tools')"
        required: true
        default: "sample_value"
      programming_languages:
        description: "Programming languages to filter by (e.g. 'Python, TypeScript')"
        required: true
        default: "sample_value"
      project_types:
        description: "Project types to discover (e.g. 'libraries, frameworks')"
        required: true
        default: "sample_value"

jobs:
  run-crew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: crewAI_discover_oss_project
        run: uv sync

      - name: Install markdown converter
        run: pip install markdown

      - name: Run CrewAI agent
        working-directory: crewAI_discover_oss_project
        env:
          # GitHub token used as the API key for the Copilot model endpoint
          OPENAI_API_KEY: ${{ secrets.GH_MODELS_TOKEN }}
          OPENAI_API_BASE: "https://models.inference.ai.azure.com"
          # Serper key for the SerperDevTool (web search)
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          # Crew inputs passed as env vars and picked up in main.py
          CREW_CRITERIA: ${{ github.event.inputs.criteria }}
          CREW_PROGRAMMING_LANGUAGES: ${{ github.event.inputs.programming_languages }}
          CREW_PROJECT_TYPES: ${{ github.event.inputs.project_types }}
        run: |
          uv run python -c "
          import os
          import markdown
          from open_source_project_discovery.crew import OpenSourceProjectDiscoveryCrew

          inputs = {
              'criteria': os.environ['CREW_CRITERIA'],
              'programming_languages': os.environ['CREW_PROGRAMMING_LANGUAGES'],
              'project_types': os.environ['CREW_PROJECT_TYPES'],
          }

          result = OpenSourceProjectDiscoveryCrew().crew().kickoff(inputs=inputs)
          md_content = str(result)
          print(md_content)

          # Save as Markdown
          with open('../crew_output.md', 'w') as f:
              f.write(md_content)

          # Convert to HTML with a clean wrapper
          html_body = markdown.markdown(md_content, extensions=['tables', 'fenced_code'])
          html = f'''<!DOCTYPE html>
          <html lang=\"en\">
          <head>
            <meta charset=\"UTF-8\">
            <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
            <title>OSS Discovery Report</title>
            <style>
              body {{ font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; line-height: 1.6; color: #24292e; }}
              h1, h2, h3 {{ border-bottom: 1px solid #eaecef; padding-bottom: 8px; }}
              code {{ background: #f6f8fa; padding: 2px 6px; border-radius: 4px; font-size: 90%; }}
              pre {{ background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; }}
              table {{ border-collapse: collapse; width: 100%; }}
              th, td {{ border: 1px solid #dfe2e5; padding: 8px 12px; }}
              th {{ background: #f6f8fa; }}
              a {{ color: #0366d6; }}
            </style>
          </head>
          <body>
          {html_body}
          </body>
          </html>'''

          with open('../crew_output.html', 'w') as f:
              f.write(html)
          "

      - name: Upload crew output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crew-output-${{ github.run_id }}
          path: |
            crew_output.md
            crew_output.html
          retention-days: 7
